<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>CoreCart Documentation</title>

<meta
http-equiv="X-UA-Compatible"
content="IE=edge,chrome=1"

>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, minimum-scale=1.0"

>

<meta
name="description"
content="Official documentation for the CoreCart e-commerce platform."

>

  <link
    rel="stylesheet"
    href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
    title="docsify-darklight-theme"
    type="text/css"
  >

  <style>
    .edit-on-github {
      display: inline-block;
      margin: 0 0 24px;
      padding: 8px 14px;
      border: 1px solid #58a6ff;
      border-radius: 6px;
      color: #58a6ff;
      font-size: 14px;
      text-decoration: none;
      transition:
        background-color 0.2s ease,
        color 0.2s ease;
    }

    .edit-on-github:hover {
      background-color: #58a6ff;
      color: #ffffff;
      text-decoration: none;
    }
  </style>

</head>

<body>
  <div id="app">Loading CoreCart knowledge base...</div>

  <script src="//unpkg.com/docsify-edit-on-github/index.js"></script>

  <script>
    window.$docsify = {
      name: 'CoreCart Docs',

      repo: 'nothapt/CoreCartDocs',

      homepage: 'README.md',

      loadSidebar: true,

      subMaxLevel: 2,

      auto2top: true,

      relativePath: false,

      notFoundPage: true,

      plugins: [
        EditOnGithubPlugin.create(
          'https://github.com/nothapt/CoreCartDocs/blob/main/',
          'https://github.com/nothapt/CoreCartDocs/edit/main/',
          'Edit this page on GitHub'
        )
      ],

      darklightTheme: {
        defaultTheme: 'dark',

        dark: {
          background: '#0d1117',
          accent: '#58a6ff'
        }
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <script
    src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"
    type="text/javascript"
  ></script>

</body>
</html>
